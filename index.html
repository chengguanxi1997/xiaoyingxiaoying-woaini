<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>超市会员积分系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Microsoft YaHei', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        header {
            background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            margin-bottom: 30px; text-align: center;
        }
        header h1 { color: #667eea; font-size: 32px; margin-bottom: 10px;}
        header p { color: #666; font-size: 16px;}
        .main-content {
            display: grid; grid-template-columns: 1fr 1fr; gap: 30px;
        }
        .card {
            background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .card h2 {
            color: #667eea; font-size: 24px; margin-bottom: 25px; border-bottom: 3px solid #667eea; padding-bottom: 10px;
        }
        .form-group { margin-bottom: 20px;}
        label {
            display: block; color: #333; font-weight: bold; margin-bottom: 8px;
        }
        input, select {
            width: 100%; padding: 12px 15px; border: 2px solid #e0e0e0;
            border-radius: 8px; font-size: 16px; transition: border-color 0.3s;
        }
        input:focus, select:focus { outline: none; border-color: #667eea; }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; border: none; padding: 12px 30px;
            border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);}
        .member-info {
            background: #f8f9ff; padding: 20px; border-radius: 10px; margin-bottom: 20px;
        }
        .info-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #e0e0e0;}
        .info-row:last-child { border-bottom: none; }
        .info-label { color: #666; }
        .info-value { color: #333; font-weight: bold; }
        .points-display {
            font-size: 48px; color: #667eea; font-weight: bold; text-align: center; padding: 30px 0;
        }
        .record-list { max-height: 400px; overflow-y: auto; }
        .record-item {
            background: #f8f9ff; padding: 15px; border-radius: 8px; margin-bottom: 10px;
            border-left: 4px solid #667eea;
        }
        .record-date { color: #999; font-size: 14px; margin-bottom: 5px; }
        .record-desc { color: #333; font-weight: bold; }
        .record-points { color: #667eea; font-size: 18px; font-weight: bold; margin-top: 5px; }
        .record-points.minus { color: #e74c3c; }
        @media (max-width: 768px) { .main-content { grid-template-columns: 1fr;} }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🏪 超市会员积分系统</h1>
            <p>管理会员积分，消费积分，积分兑换</p>
        </header>
        <div class="main-content">
            <div class="card">
                <h2>👤 会员管理</h2>
                <div class="form-group">
                    <label>会员手机号</label>
                    <input type="text" id="phone" placeholder="请输入会员手机号">
                </div>
                <div class="form-group">
                    <label>会员姓名</label>
                    <input type="text" id="name" placeholder="请输入会员姓名">
                </div>
                <button onclick="addMember()">添加/查询会员</button>
                <div id="memberInfo" style="display: none; margin-top: 25px;">
                    <div class="points-display" id="pointsDisplay">0</div>
                    <div class="member-info">
                        <div class="info-row">
                            <span class="info-label">会员姓名</span>
                            <span class="info-value" id="displayName">-</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">会员手机号</span>
                            <span class="info-value" id="displayPhone">-</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">当前积分</span>
                            <span class="info-value" id="displayPoints">0</span>
                        </div>
                    </div>
                </div>
            </div>
            <div class="card">
                <h2>💰 积分操作</h2>
                <div class="form-group">
                    <label>操作类型</label>
                    <select id="actionType">
                        <option value="add">消费积分</option>
                        <option value="minus">积分兑换</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>金额/积分</label>
                    <input type="number" id="amount" placeholder="请输入金额或积分">
                </div>
                <div class="form-group">
                    <label>备注</label>
                    <input type="text" id="remark" placeholder="请输入备注信息">
                </div>
                <button onclick="updatePoints()">确认操作</button>
                <div style="margin-top: 25px;">
                    <h3 style="color: #667eea; margin-bottom: 15px;">📋 积分记录</h3>
                    <div class="record-list" id="recordList">
                        <p style="color: #999; text-align: center;">暂无记录</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        let members = JSON.parse(localStorage.getItem('members')) || {};
        let currentMember = null;
        function addMember() {
            const phone = document.getElementById('phone').value.trim();
            const name = document.getElementById('name').value.trim();
            if (!phone) {
                alert('请输入会员手机号！');
                return;
            }
            if (!members[phone]) {
                if (!name) {
                    alert('新会员请输入姓名！');
                    return;
                }
                members[phone] = {
                    name: name,
                    phone: phone,
                    points: 0,
                    records: []
                };
                saveData();
                alert('会员添加成功！');
            }
            currentMember = members[phone];
            displayMember();
            displayRecords();
        }
        function displayMember() {
            document.getElementById('memberInfo').style.display = 'block';
            document.getElementById('displayName').textContent = currentMember.name;
            document.getElementById('displayPhone').textContent = currentMember.phone;
            document.getElementById('displayPoints').textContent = currentMember.points;
            document.getElementById('pointsDisplay').textContent = currentMember.points;
        }
        function updatePoints() {
            if (!currentMember) {
                alert('请先查询会员！');
                return;
            }
            const actionType = document.getElementById('actionType').value;
            const amount = parseFloat(document.getElementById('amount').value);
            const remark = document.getElementById('remark').value.trim() || '无备注';
            if (!amount || amount <= 0) {
                alert('请输入有效的金额/积分！');
                return;
            }
            let pointsChange = 0;
            let desc = '';
            if (actionType === 'add') {
                pointsChange = Math.floor(amount);
                desc = `消费: ¥${amount.toFixed(2)}, ${remark}`;
            } else {
                if (amount > currentMember.points) {
                    alert('积分不足！');
                    return;
                }
                pointsChange = -amount;
                desc = `积分兑换: ${remark}`;
            }
            currentMember.points += pointsChange;
            currentMember.records.unshift({
                date: new Date().toLocaleString('zh-CN'),
                desc: desc,
                points: pointsChange
            });
            saveData();
            displayMember();
            displayRecords();
            document.getElementById('amount').value = '';
            document.getElementById('remark').value = '';
            alert('操作成功！');
        }
        function displayRecords() {
            const recordList = document.getElementById('recordList');
            if (currentMember.records.length === 0) {
                recordList.innerHTML = '<p style="color: #999; text-align: center;">暂无记录</p>';
                return;
            }
            recordList.innerHTML = currentMember.records.map(record => `
                <div class="record-item">
                    <div class="record-date">${record.date}</div>
                    <div class="record-desc">${record.desc}</div>
                    <div class="record-points ${record.points < 0 ? 'minus' : ''}">
                        ${record.points > 0 ? '+' : ''}${record.points} 积分
                    </div>
                </div>
            `).join('');
        }
        function saveData() {
            localStorage.setItem('members', JSON.stringify(members));
        }
    </script>
</body>
</html>
